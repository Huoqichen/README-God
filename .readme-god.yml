title: README-God
description: Generate GitHub-ready bilingual READMEs from any repository.
description_zh: 从任意仓库生成适合 GitHub 的双语 README。
repo_slug: Huoqichen/README-God
cli_name: readme-god
features:
  - Scan repo metadata and infer a clean README structure.
  - Generate README.md and docs/README.zh-CN.md together.
  - Keep output concise, template-driven, and easy to refine.
features_zh:
  - 扫描仓库元信息并推断清晰的 README 结构。
  - 同时生成 README.md 和 docs/README.zh-CN.md。
  - 输出简洁、模板化，便于继续调整。
installation:
  - python -m venv .venv
  - .venv\Scripts\activate
  - pip install -e .
usage:
  - readme-god init
  - readme-god generate --repo .
commands:
  - name: readme-god init
    description: Create a starter .readme-god.yml.
  - name: readme-god generate
    description: Generate bilingual README files for the current repository.
  - name: readme-god generate --repo .
    description: Generate bilingual README files for a specific repository path.
commands_zh:
  - name: readme-god init
    description: 创建起始版 .readme-god.yml。
  - name: readme-god generate
    description: 为当前仓库生成双语 README。
  - name: readme-god generate --repo .
    description: 为指定仓库路径生成双语 README。
roadmap:
  - Improve repo signal detection.
  - Add more template customization points.
roadmap_zh:
  - 改进仓库特征识别能力。
  - 增加更多模板定制点。
contributing: Issues and pull requests are welcome. Keep changes focused and tested.
contributing_zh: 欢迎提交 Issue 和 Pull Request。请保持改动聚焦，并补充测试。
license: MIT
