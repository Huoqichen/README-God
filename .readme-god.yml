title: README-God
description: Generate beautiful GitHub READMEs automatically.
description_zh: 自动生成漂亮的 GitHub README。
tagline: One command. Professional README.
tagline_zh: 一条命令，专业 README。
repo_slug: Huoqichen/README-God
cli_name: readme-god
features:
  - Scan repo metadata and infer a clean README structure.
  - Generate README.md and docs/README.zh-CN.md together.
  - Clone a GitHub repo and open a polished local preview page.
features_zh:
  - 扫描仓库元信息并推断清晰的 README 结构。
  - 同时生成 README.md 和 docs/README.zh-CN.md。
  - 克隆 GitHub 仓库并生成适合演示的本地预览页。
installation:
  - python -m venv .venv
  - .venv\Scripts\activate
  - pip install -e .
usage:
  - readme-god preview https://github.com/user/repo
  - readme-god generate .
  - open preview/index.html
commands:
  - name: readme-god init
    description: Create a starter .readme-god.yml.
  - name: readme-god generate
    description: Generate bilingual README files for the current repository.
  - name: readme-god preview <github_repo_url>
    description: Clone a GitHub repository, generate README files, and build a local preview page.
commands_zh:
  - name: readme-god init
    description: 创建起始版 .readme-god.yml。
  - name: readme-god generate
    description: 为当前仓库生成双语 README。
  - name: readme-god preview <github_repo_url>
    description: 克隆 GitHub 仓库，生成 README，并构建本地预览页。
roadmap:
  - Improve repo signal detection.
  - Add more template customization points.
roadmap_zh:
  - 改进仓库特征识别能力。
  - 增加更多模板定制点。
contributing: Issues and pull requests are welcome. Keep changes focused and tested.
contributing_zh: 欢迎提交 Issue 和 Pull Request。请保持改动聚焦，并补充测试。
license: MIT
